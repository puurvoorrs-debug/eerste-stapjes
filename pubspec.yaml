name: moment_opname
description: A new Flutter project.

publish_to: 'none' 

version: 2.5.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  shared_preferences: ^2.5.4
  package_info_plus: ^8.0.0
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  path: ^1.9.0
  table_calendar: ^3.1.0
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.2
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  flutter_svg: ^2.3.0
  google_fonts: ^8.0.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.0.0
  workmanager: ^0.9.0+3
  cloud_functions: ^5.6.2
  go_router: ^17.1.0
  gal: ^2.3.2
  dio: ^5.9.2
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Statische_logo_voor_app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/Statische_logo_voor_app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/tips/
    - assets/images/logo_left_foot.svg
    - assets/images/logo_right_foot.svg
    - assets/google_logo.png

  fonts:
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
